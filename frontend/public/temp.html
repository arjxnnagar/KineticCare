<div class="max-w-7xl mx-auto px-6 py-8">

    <!-- TOP CONTROL BAR -->
    <div id="control-panel"
        class="border border-gray-300 rounded-lg p-6 bg-white mb-6">

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">

            <!-- Exercise Select -->
            <div class="flex flex-col">
                <label class="font-raleway text-lg font-semibold text-gray-800 mb-2">
                    Therapy Program
                </label>

                <select id="exercise-select"
                    onchange="resetCounters()"
                    class="h-12 px-4 border border-gray-300 rounded-lg font-inter focus:outline-none focus:ring-2 focus:ring-blue-500">

                    <option value="left_curl">Left Arm (Bicep Mobility)</option>
                    <option value="right_curl">Right Arm (Bicep Mobility)</option>
                    <option value="squat">Full Body Squat</option>
                    <option value="knee_ext">Knee Extension</option>
                    <option value="shoulder_lat">Lateral Raise</option>
                    <option value="shoulder_front">Front Raise</option>

                </select>
            </div>

            <!-- Goal -->
            <div class="flex flex-col">
                <label class="font-raleway text-lg font-semibold text-gray-800 mb-2">
                    Goal
                </label>

                <input
                    type="number"
                    id="target-input"
                    value="5"
                    min="1"
                    class="h-12 px-4 border border-gray-300 rounded-lg font-inter focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
            </div>

            <!-- Buttons -->
            <div class="flex flex-col gap-3">

                <button
                    onclick="showInstructions()"
                    class="h-12 bg-gray-100 hover:bg-gray-200 rounded-lg font-inter font-medium transition">

                    Therapy Guide

                </button>

                <button
                    onclick="resetCounters()"
                    class="h-12 bg-black text-white hover:bg-gray-900 rounded-lg font-inter font-medium transition">

                    Reset Session

                </button>

            </div>

        </div>

    </div>

    <!-- MAIN CONTENT -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- CAMERA SECTION -->
        <div class="lg:col-span-2">

            <div
                id="video-container"
                class="relative bg-gray-100 rounded-xl overflow-hidden border border-gray-300 min-h-[520px] flex items-center justify-center">

                <video
                    id="webcam"
                    autoplay
                    playsinline
                    class="absolute inset-0 w-full h-full object-cover">
                </video>

                <canvas
                    id="skeleton-canvas"
                    width="640"
                    height="480"
                    class="absolute inset-0 w-full h-full">
                </canvas>

            </div>

        </div>

        <!-- STATS PANEL -->
        <div>

            <div
                id="data-box"
                class="bg-gray-100 border border-gray-300 rounded-xl p-8 h-[520px] flex items-start justify-start font-inter text-3xl text-gray-800">

                Initializing AR WebGL Engine...

            </div>

        </div>

    </div>

</div>

<!-- INSTRUCTION MODAL -->
<div
    id="instruction-modal"
    style="display:none"
    class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center">

    <div class="bg-white rounded-2xl p-8 w-[90%] max-w-xl">

        <h2
            id="guide-title"
            class="font-raleway text-3xl font-bold mb-4">
            Exercise Name
        </h2>

        <p
            id="guide-text"
            class="font-inter text-gray-700 leading-7">
            Instructions go here...
        </p>

        <button
            onclick="closeInstructions()"
            class="mt-6 bg-black text-white px-6 py-3 rounded-lg font-inter">

            Got It, Let's Go

        </button>

    </div>

</div>
